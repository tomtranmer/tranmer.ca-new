<svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="180" height="180" fill="#3b82f6" rx="40"/>

  <!-- Decorative circle -->
  <circle cx="90" cy="90" r="65" fill="#1e40af" opacity="0.8"/>

  <!-- Portfolio/Code symbol - bracket design -->
  <g transform="translate(90, 90)">
    <!-- Left bracket -->
    <path d="M -25 -30 L -40 -30 L -40 30 L -25 30" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Right bracket -->
    <path d="M 25 -30 L 40 -30 L 40 30 L 25 30" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Dot separator -->
    <circle cx="0" cy="0" r="4" fill="white"/>
  </g>
</svg>
